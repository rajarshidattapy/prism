version: "3.9"

services:
  agent:
    build:
      context: .
      target: agent
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - prism-net

  ui:
    build:
      context: ./ui
      dockerfile: ../Dockerfile.ui
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_WS_URL=ws://agent:3001
    depends_on:
      - agent
    restart: unless-stopped
    networks:
      - prism-net

  simulation:
    build:
      context: .
      target: simulation
    volumes:
      - ./simulation/outputs:/app/simulation/outputs
    env_file: .env
    profiles:
      - sim
    networks:
      - prism-net

networks:
  prism-net:
    driver: bridge
